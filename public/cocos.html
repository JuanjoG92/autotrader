<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cocos Capital — AutoTrader</title>
  <link rel="stylesheet" href="/css/app.css">
  <link rel="stylesheet" href="/css/cocos.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="dashboard-page">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <a href="/" class="sidebar-logo"><i class="fas fa-chart-line"></i> <span>AutoTrader</span></a>
    </div>
    <nav class="sidebar-nav">
      <a href="/dashboard" class="sidebar-link"><i class="fas fa-home"></i> <span>Resumen</span></a>
      <a href="/cocos" class="sidebar-link active"><i class="fas fa-landmark"></i> <span>Cocos Capital</span></a>
      <a href="/dashboard" class="sidebar-link"><i class="fas fa-robot"></i> <span>Mis Bots</span></a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info"><i class="fas fa-user-circle"></i><span id="userName">Usuario</span></div>
      <button class="btn-icon" onclick="localStorage.removeItem('token');location.href='/login'"><i class="fas fa-sign-out-alt"></i></button>
    </div>
  </aside>

  <!-- Topbar mobile -->
  <header class="topbar">
    <button class="btn-icon" onclick="document.getElementById('sidebar').classList.toggle('open')"><i class="fas fa-bars"></i></button>
    <span class="topbar-title">Cocos Capital</span>
    <span id="marketStatus" style="font-size:.75rem"></span>
  </header>

  <!-- Main -->
  <main class="main-content" style="padding:0">
    <div class="cocos-grid">

      <!-- ── COLUMNA IZQUIERDA ── -->
      <div class="cocos-left">

        <!-- Estado conexión -->
        <div class="cc-card">
          <div class="cc-card-title"><i class="fas fa-plug"></i> Conexión Cocos</div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem">
            <span id="cocosStatus" style="font-size:.85rem"></span>
            <span id="marketStatus" style="font-size:.75rem"></span>
          </div>
          <div style="font-size:.75rem;color:var(--muted)">
            <span id="cocosAccount"></span> &nbsp;|&nbsp; Token: <span id="cocosToken"></span>
          </div>
        </div>

        <!-- Poder de compra -->
        <div class="cc-card">
          <div class="cc-card-title"><i class="fas fa-wallet"></i> Fondos Disponibles</div>
          <div id="buyingPower" style="color:var(--buy)"></div>
        </div>

        <!-- Portfolio -->
        <div class="cc-card">
          <div class="cc-card-title"><i class="fas fa-briefcase"></i> Mi Cartera</div>
          <div id="portfolioList"></div>
        </div>

        <!-- Orden manual -->
        <div class="cc-card">
          <div class="cc-card-title"><i class="fas fa-exchange-alt"></i> Operar Manualmente</div>
          <div class="order-tabs">
            <button class="order-tab active-buy" id="tabBuy"  onclick="setOrderSide('BUY')">COMPRAR</button>
            <button class="order-tab"             id="tabSell" onclick="setOrderSide('SELL')">VENDER</button>
          </div>
          <div class="form-group">
            <label>Instrumento (Ej: GGAL, YPFD, MELI)</label>
            <input id="orderTicker" placeholder="Ej: GGAL" oninput="this.value=this.value.toUpperCase()">
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem">
            <div class="form-group">
              <label>Cantidad</label>
              <input id="orderQty" type="number" min="1" placeholder="10">
            </div>
            <div class="form-group">
              <label>Precio ($)</label>
              <input id="orderPrice" type="number" step="0.01" placeholder="0.00">
            </div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem">
            <div class="form-group">
              <label>Plazo</label>
              <select id="orderSettlement">
                <option value="24hs">24hs</option>
                <option value="CI">CI (contado)</option>
                <option value="48hs">48hs</option>
              </select>
            </div>
            <div class="form-group">
              <label>Moneda</label>
              <select id="orderCurrency">
                <option value="ARS">ARS (Pesos)</option>
                <option value="USD">USD</option>
              </select>
            </div>
          </div>
          <button class="btn-buy" id="btnOrder" onclick="submitOrder()">ENVIAR ORDEN</button>
        </div>
      </div>

      <!-- ── COLUMNA CENTRAL — Mercado en tiempo real ── -->
      <div class="cocos-center">
        <div class="cc-card" style="height:100%">
          <div class="cc-card-title" style="justify-content:space-between">
            <span><i class="fas fa-chart-bar"></i> Mercado en Tiempo Real</span>
            <span style="font-size:.7rem;color:var(--muted)">Actualiza cada 30s</span>
          </div>
          <div style="overflow-x:auto">
            <table class="market-table">
              <thead>
                <tr>
                  <th>Ticker</th><th>Precio</th><th>Var %</th><th>RSI</th><th>SMA20</th><th>Tend.</th>
                </tr>
              </thead>
              <tbody id="marketBody"></tbody>
            </table>
          </div>

          <!-- Agregar a watchlist -->
          <div style="margin-top:1rem;display:flex;gap:.5rem;align-items:flex-end;flex-wrap:wrap">
            <div class="form-group" style="margin:0;flex:1;min-width:100px">
              <label style="font-size:.7rem">Agregar ticker</label>
              <input id="newTicker" placeholder="GGAL" oninput="this.value=this.value.toUpperCase()" style="width:100%;padding:.4rem;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:.82rem">
            </div>
            <div class="form-group" style="margin:0">
              <label style="font-size:.7rem">Tipo</label>
              <select id="newType" style="padding:.4rem;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:.82rem">
                <option value="ACCIONES">Acción</option>
                <option value="CEDEARS">CEDEAR</option>
                <option value="BONOS">Bono</option>
              </select>
            </div>
            <button onclick="addToWatchlist()" style="padding:.4rem .8rem;background:var(--ai);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:.82rem;white-space:nowrap">+ Agregar</button>
          </div>
        </div>
      </div>

      <!-- ── COLUMNA DERECHA — Agente AI ── -->
      <div class="cocos-right">

        <!-- Estado AI -->
        <div class="cc-card">
          <div class="cc-card-title" style="justify-content:space-between">
            <span><i class="fas fa-robot"></i> Agente IA</span>
            <span id="aiStatusBadge"></span>
          </div>
          <div id="aiAnalysis" class="analysis-text" style="display:none"></div>
          <div class="toggle-row">
            <span class="toggle-label">🤖 IA Activada</span>
            <label class="switch"><input type="checkbox" id="aiEnabled"><span class="slider"></span></label>
          </div>
          <div class="toggle-row">
            <span class="toggle-label">⚡ Auto-ejecutar órdenes</span>
            <label class="switch"><input type="checkbox" id="aiAutoExec"><span class="slider"></span></label>
          </div>
          <div class="form-group">
            <label>Máx. por operación (ARS $)</label>
            <input id="aiMaxTrade" type="number" value="50000">
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem">
            <div class="form-group">
              <label>Confianza mín (%)</label>
              <input id="aiMinConf" type="number" min="50" max="99" value="75">
            </div>
            <div class="form-group">
              <label>Riesgo</label>
              <select id="aiRisk">
                <option value="low">Bajo</option>
                <option value="medium" selected>Medio</option>
                <option value="high">Alto</option>
              </select>
            </div>
          </div>
          <button class="btn-analyze" id="btnAnalyze" onclick="triggerAnalysis()">🤖 Analizar Ahora</button>
          <button onclick="saveAIConfig()" style="width:100%;padding:.5rem;background:transparent;border:1px solid var(--ai);color:var(--ai);border-radius:8px;cursor:pointer;font-size:.82rem">💾 Guardar Config</button>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-top:.75rem">
            <span style="font-size:.72rem;color:var(--muted)">Sentimiento:</span>
            <span id="aiSentiment"></span>
          </div>
        </div>

        <!-- Señales AI -->
        <div class="cc-card">
          <div class="cc-card-title" style="justify-content:space-between">
            <span><i class="fas fa-bell"></i> Señales Recientes</span>
            <button onclick="loadSignals()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:.8rem">↺</button>
          </div>
          <div id="signalsList"></div>
        </div>

      </div>
    </div>
  </main>

  <script src="/js/cocos.js"></script>
  <script>
    // Cargar nombre usuario
    try {
      const p = JSON.parse(atob(localStorage.getItem('token').split('.')[1]));
      document.getElementById('userName').textContent = p.email || p.name || 'Usuario';
    } catch {}

    // Watchlist helper
    async function addToWatchlist() {
      const ticker = document.getElementById('newTicker').value.trim().toUpperCase();
      const type   = document.getElementById('newType').value;
      if (!ticker) return;
      const r = await api('POST', '/ai/market/watchlist', { ticker, instrument_type: type, segment: 'C', currency: 'ARS' });
      if (r?.ok) { document.getElementById('newTicker').value = ''; loadMarketPrices(); }
    }

    // Mostrar análisis cuando llega
    const origUpdate = window.updateAIPanel;
    window.updateAIPanel = function(data) {
      origUpdate(data);
      const el = document.getElementById('aiAnalysis');
      if (el && data?.analysis) { el.textContent = data.analysis; el.style.display = 'block'; }
    };
  </script>
</body>
</html>
