<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear cuenta - AutoTrader</title>
  <link rel="stylesheet" href="/css/app.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
  <div class="auth-container">
    <a href="/" class="auth-logo"><i class="fas fa-chart-line"></i> AutoTrader</a>
    <div class="auth-card">
      <h2>Crear cuenta</h2>
      <form id="registerForm">
        <div class="form-group">
          <label for="name"><i class="fas fa-user"></i> Nombre</label>
          <input type="text" id="name" placeholder="Tu nombre" required>
        </div>
        <div class="form-group">
          <label for="email"><i class="fas fa-envelope"></i> Email</label>
          <input type="email" id="email" placeholder="tu@email.com" required>
        </div>
        <div class="form-group">
          <label for="password"><i class="fas fa-lock"></i> Contraseña</label>
          <input type="password" id="password" placeholder="Mínimo 6 caracteres" required minlength="6">
        </div>
        <div class="form-group">
          <label for="password2"><i class="fas fa-lock"></i> Confirmar contraseña</label>
          <input type="password" id="password2" placeholder="Repetí tu contraseña" required>
        </div>
        <div id="errorMsg" class="error-msg" style="display:none"></div>
        <button type="submit" class="btn btn-primary btn-block" id="submitBtn">
          <i class="fas fa-user-plus"></i> Crear cuenta
        </button>
      </form>
      <p class="auth-link">¿Ya tenés cuenta? <a href="/login">Iniciar sesión</a></p>
    </div>
  </div>
  <script src="/js/app.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
